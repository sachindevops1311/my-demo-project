<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jenkins CI/CD Pipeline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 70px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .badge {
      display: inline-block;
      background: #d63031;
      color: white;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 42px;
      color: #ffffff;
      margin-bottom: 10px;
    }

    h1 span {
      color: #00cec9;
    }

    .subtitle {
      font-size: 16px;
      color: #b2bec3;
      margin-bottom: 40px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .status-item {
      background: rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 20px 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-item .icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .status-item .label {
      font-size: 11px;
      color: #636e72;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .status-item .value {
      font-size: 15px;
      color: #dfe6e9;
      font-weight: 600;
    }

    .pipeline {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .stage {
      background: #00b894;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 8px;
    }

    .arrow {
      color: #636e72;
      font-size: 18px;
    }

    .footer {
      font-size: 13px;
      color: #636e72;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 24px;
    }

    .footer span {
      color: #00cec9;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #00b894;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <div class="badge">🔴 Live Deployment</div>

      <h1>Deployed by <span>Jenkins</span></h1>
      <p class="subtitle">Nginx is running inside a Docker container via CI/CD Pipeline</p>

      <div class="status-grid">
        <div class="status-item">
          <div class="icon">🐳</div>
          <div class="label">Server</div>
          <div class="value">Nginx Alpine</div>
        </div>
        <div class="status-item">
          <div class="icon">⚙️</div>
          <div class="label">CI/CD</div>
          <div class="value">Jenkins</div>
        </div>
        <div class="status-item">
          <div class="icon">🔄</div>
          <div class="label">Trigger</div>
          <div class="value">SCM Polling</div>
        </div>
      </div>

      <div class="pipeline">
        <div class="stage">Checkout</div>
        <div class="arrow">→</div>
        <div class="stage">Build</div>
        <div class="arrow">→</div>
        <div class="stage">Stop Old</div>
        <div class="arrow">→</div>
        <div class="stage">Run New</div>
        <div class="arrow">→</div>
        <div class="stage">Verify ✅</div>
      </div>

      <div class="footer">
        <span class="dot"></span>
        Container running on <span>localhost:8090</span> &nbsp;|&nbsp; Auto-deploy on Git push via <span>SCM Poll</span>
      </div>

    </div>
  </div>
</body>
</html>
